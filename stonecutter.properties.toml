[mod]
id = "eg_template_mod"
name = "Enchanted's Template Mod"
description = "Multi-version, multi-loader mod template for Minecraft using Stonecutter."
group = "games.enchanted"
version = "1.0.0"
license = "MIT"
source_url = "https://github.com/Enchanted-Games/enchanteds-mod-template"
issue_tracker = "https://github.com/Enchanted-Games/enchanteds-mod-template/issues"
icon = "assets/eg_template_mod/icon.png"

# neoforge versions: https://projects.neoforged.net/neoforged/neoforge
# fabric versions: https://fabricmc.net/develop/

[fabric]
deps.fabric-loader = "0.18.5"
dep_str.fabric-loader = ">=0.18"

["1.21.11"]
deps.minecraft = "1.21.11"

deps.parchment = "1.21.10:2025.10.12"

[fabric."1.21.11"]
dep_str.minecraft = "1.21.11"

deps.fabric-api = "0.139.4+1.21.11"
dep_str.fabric-api = ">=0.139.4+1.21.11"

deps.modmenu = "17.0.0-alpha.1"

[neoforge."1.21.11"]
dep_str.minecraft = "[1.21.11,1.21.11]"

deps.neoforge = "21.11.10-beta"


["26.1"]
deps.minecraft = "26.1.2"

[fabric."26.1"]
dep_str.minecraft = ">=26.1 <26.2"

deps.fabric-api = "0.146.1+26.1.2"
dep_str.fabric-api = ">=0.146.1+26.1.2"

deps.modmenu = "18.0.0-alpha.8"

[neoforge."26.1"]
dep_str.minecraft = "[26.1,26.2)"

deps.neoforge = "26.1.2.21-beta"